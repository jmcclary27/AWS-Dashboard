apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aws-collaboration-dashboard.configMapName" . }}
  labels:
    {{- include "aws-collaboration-dashboard.labels" . | nindent 4 }}
data:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_HOST: {{ include "aws-collaboration-dashboard.postgresServiceName" . | quote }}
  POSTGRES_PORT: "5432"
  API_HOST: "0.0.0.0"
  API_PORT: {{ .Values.api.service.port | quote }}
  CORS_ORIGINS: {{ .Values.api.corsOrigins | quote }}
  SEED_DAYS: {{ .Values.api.seedDays | quote }}
