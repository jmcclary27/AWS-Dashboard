apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "aws-collaboration-dashboard.postgresServiceName" . }}
  labels:
    {{- include "aws-collaboration-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.postgres.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.storageSize | quote }}
