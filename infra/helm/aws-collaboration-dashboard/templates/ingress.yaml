{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aws-collaboration-dashboard.fullname" . }}
  labels:
    {{- include "aws-collaboration-dashboard.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "aws-collaboration-dashboard.apiServiceName" . }}
                port:
                  number: {{ .Values.api.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aws-collaboration-dashboard.webServiceName" . }}
                port:
                  number: {{ .Values.web.service.port }}
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "aws-collaboration-dashboard.apiServiceName" . }}
                port:
                  number: {{ .Values.api.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aws-collaboration-dashboard.webServiceName" . }}
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
