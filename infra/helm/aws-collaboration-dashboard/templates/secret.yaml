{{- $databaseURL := printf "postgresql+psycopg://%s:%s@%s:5432/%s" (.Values.postgres.username | urlquery) (.Values.postgres.password | urlquery) (include "aws-collaboration-dashboard.postgresServiceName" .) (.Values.postgres.database | urlquery) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aws-collaboration-dashboard.databaseSecretName" . }}
  labels:
    {{- include "aws-collaboration-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  DATABASE_URL: {{ $databaseURL | quote }}
