apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aws-collaboration-dashboard.webServiceName" . }}
  labels:
    {{- include "aws-collaboration-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "aws-collaboration-dashboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "aws-collaboration-dashboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.web.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ printf "%s:%s" .Values.image.web.repository .Values.image.web.tag | quote }}
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          securityContext:
            {{- toYaml .Values.web.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.port }}
              protocol: TCP
          env:
            # NEXT_PUBLIC_AUTH_ENABLED must also have been supplied when this
            # image was built. Next.js inlines NEXT_PUBLIC_* values into the
            # browser bundle, while the remaining values are read by the
            # server-side auth route handlers at runtime.
            - name: NEXT_PUBLIC_AUTH_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aws-collaboration-dashboard.configMapName" . }}
                  key: NEXT_PUBLIC_AUTH_ENABLED
            - name: COGNITO_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aws-collaboration-dashboard.configMapName" . }}
                  key: COGNITO_DOMAIN
            - name: COGNITO_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aws-collaboration-dashboard.configMapName" . }}
                  key: COGNITO_CLIENT_ID
            - name: COGNITO_SCOPES
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aws-collaboration-dashboard.configMapName" . }}
                  key: COGNITO_SCOPES
            - name: COGNITO_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aws-collaboration-dashboard.configMapName" . }}
                  key: COGNITO_REDIRECT_URI
            - name: COGNITO_LOGOUT_URI
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aws-collaboration-dashboard.configMapName" . }}
                  key: COGNITO_LOGOUT_URI
            - name: COGNITO_REFRESH_TOKEN_MAX_AGE_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aws-collaboration-dashboard.configMapName" . }}
                  key: COGNITO_REFRESH_TOKEN_MAX_AGE_SECONDS
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
