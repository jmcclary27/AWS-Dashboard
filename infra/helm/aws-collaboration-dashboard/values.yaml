nameOverride: ""
fullnameOverride: ""

image:
  web:
    repository: aws-dashboard-web
    tag: local
    pullPolicy: Never
  api:
    repository: aws-dashboard-api
    tag: local
    pullPolicy: Never

postgres:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: aws_dashboard
  username: dashboard
  # For local use only. Supply a different value through a private values file
  # before deploying anywhere shared.
  password: dashboard
  storageSize: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

api:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
  corsOrigins: http://localhost:3000
  seedDays: 90
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Cognito uses a public OAuth client with authorization-code + PKCE, so no
# client secret is stored in this chart. Leave authentication disabled for the
# self-contained local demo. For an authenticated deployment, set enabled,
# the Cognito values, and build the web image with the same
# NEXT_PUBLIC_AUTH_ENABLED value before installing the chart.
auth:
  enabled: false
  publicAppUrl: http://localhost:3000
  clockSkewSeconds: 60
  cognito:
    domain: ""
    clientId: ""
    region: ""
    userPoolId: ""
    # Issuer and JWKS URL are derived from region + user-pool ID when blank.
    issuer: ""
    jwksUrl: ""
    jwksCacheSeconds: 3600
    # Use the standard Managed Login userInfo endpoint when blank.
    userinfoUrl: ""
    scopes: "openid email profile"
    redirectUri: ""
    logoutUri: ""
    refreshTokenMaxAgeSeconds: 2592000
  # Required only when the tenancy migration encounters existing non-demo
  # connections. It intentionally fails without an explicit owner.
  bootstrapOwner:
    subject: ""
    email: ""
    issuer: ""
    workspaceName: ""

web:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

bootstrap:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 300

ingress:
  enabled: false
  className: traefik
  annotations: {}
  host: aws-dashboard.local

# Name of a pre-existing Secret containing short-lived standard AWS credential
# variables. It is injected only into the API pod when non-empty.
aws:
  existingSecret: ""
