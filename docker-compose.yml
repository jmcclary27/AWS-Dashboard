services:
  postgres:
    image: postgres:16-alpine
    container_name: aws-dashboard-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aws_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard} -d ${POSTGRES_DB:-aws_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 20

  bootstrap:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aws-dashboard-bootstrap
    command: ["python", "-m", "app.db.init_db"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://dashboard:dashboard@postgres:5432/aws_dashboard}
      SEED_DAYS: ${SEED_DAYS:-90}
      COGNITO_ISSUER: ${COGNITO_ISSUER:-}
      COGNITO_REGION: ${COGNITO_REGION:-}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      AUTH_BOOTSTRAP_OWNER_SUB: ${AUTH_BOOTSTRAP_OWNER_SUB:-}
      AUTH_BOOTSTRAP_OWNER_EMAIL: ${AUTH_BOOTSTRAP_OWNER_EMAIL:-}
      AUTH_BOOTSTRAP_OWNER_ISSUER: ${AUTH_BOOTSTRAP_OWNER_ISSUER:-}
      AUTH_BOOTSTRAP_WORKSPACE_NAME: ${AUTH_BOOTSTRAP_WORKSPACE_NAME:-}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aws-dashboard-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://dashboard:dashboard@postgres:5432/aws_dashboard}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      SEED_DAYS: ${SEED_DAYS:-90}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_CLOCK_SKEW_SECONDS: ${AUTH_CLOCK_SKEW_SECONDS:-60}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN:-}
      COGNITO_REGION: ${COGNITO_REGION:-}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      COGNITO_APP_CLIENT_ID: ${COGNITO_APP_CLIENT_ID:-}
      COGNITO_ISSUER: ${COGNITO_ISSUER:-}
      COGNITO_JWKS_URL: ${COGNITO_JWKS_URL:-}
      COGNITO_JWKS_CACHE_SECONDS: ${COGNITO_JWKS_CACHE_SECONDS:-3600}
      COGNITO_USERINFO_URL: ${COGNITO_USERINFO_URL:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_SDK_LOAD_CONFIG: ${AWS_SDK_LOAD_CONFIG:-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-false}
    container_name: aws-dashboard-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-false}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN:-}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-}
      COGNITO_REDIRECT_URI: ${COGNITO_REDIRECT_URI:-http://localhost:3000/auth/callback}
      COGNITO_LOGOUT_URI: ${COGNITO_LOGOUT_URI:-http://localhost:3000/}
      COGNITO_SCOPES: ${COGNITO_SCOPES:-openid email profile}
      COGNITO_REFRESH_TOKEN_MAX_AGE_SECONDS: ${COGNITO_REFRESH_TOKEN_MAX_AGE_SECONDS:-2592000}
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:
